<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝奏云直链解析工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(90deg, #4b6cb7 0%, #182848 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .content {
            padding: 40px;
        }
        
        .input-section {
            margin-bottom: 40px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            border-color: #4b6cb7;
            box-shadow: 0 0 0 3px rgba(75, 108, 183, 0.1);
            outline: none;
        }
        
        .input-group input::placeholder {
            color: #a0aec0;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(90deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(75, 108, 183, 0.2);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .btn i {
            margin-right: 10px;
        }
        
        .result-section {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .result-header h2 {
            color: #2c3e50;
            font-size: 1.8rem;
        }
        
        .status {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .error {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .result-content {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 25px;
        }
        
        .result-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .result-label {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .result-label i {
            margin-right: 10px;
            width: 20px;
            color: #4b6cb7;
        }
        
        .result-value {
            font-size: 1.1rem;
            word-break: break-all;
        }
        
        .download-btn {
            display: inline-block;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .download-btn:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }
        
        .error-message {
            color: #dc2626;
            font-weight: 600;
            background-color: #fef2f2;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #dc2626;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4b6cb7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading p {
            font-size: 1.2rem;
            color: #4b5563;
            font-weight: 600;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            background-color: #f8fafc;
        }
        
        .instructions {
            background-color: #f0f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 5px solid #3b82f6;
        }
        
        .instructions h3 {
            color: #1e40af;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        .instructions h3 i {
            margin-right: 10px;
        }
        
        .instructions ol {
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        @media (max-width: 768px) {
            .container {
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 25px;
            }
            
            .btn {
                padding: 16px 20px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 1.7rem;
            }
            
            .content {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cloud-download-alt"></i> 蓝奏云直链解析</h1>
            <p>快速解析蓝奏云链接，获取真实下载地址</p>
        </div>
        
        <div class="content">
            <div class="instructions">
                <h3><i class="fas fa-info-circle"></i> 使用说明</h3>
                <ol>
                    <li>在下方输入蓝奏云分享链接和密码（如果有）</li>
                    <li>点击"解析链接"按钮</li>
                    <li>稍等片刻即可获取解析结果和下载链接</li>
                    <li>本工具基于第三方API接口实现，仅供学习交流使用</li>
                </ol>
            </div>
            
            <div class="input-section">
                <div class="input-group">
                    <label for="url"><i class="fas fa-link"></i> 蓝奏云分享链接</label>
                    <input type="text" id="url" placeholder="请输入蓝奏云分享链接，例如：https://www.lanzou.com/xxxxx" value="">
                </div>
                
                <div class="input-group">
                    <label for="pwd"><i class="fas fa-key"></i> 文件密码（可选）</label>
                    <input type="text" id="pwd" placeholder="如果文件有密码，请输入密码（可选）" value="">
                </div>
                
                <button class="btn" id="parse-btn">
                    <i class="fas fa-magic"></i> 解析链接
                </button>
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在解析链接，请稍候...</p>
            </div>
            
            <div class="result-section" id="result-section">
                <div class="result-header">
                    <h2><i class="fas fa-file-download"></i> 解析结果</h2>
                    <div class="status" id="status">成功</div>
                </div>
                
                <div class="result-content" id="result-content">
                    <!-- 结果将动态插入到这里 -->
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 蓝奏云解析工具 | 基于PearAPI接口 | 仅供学习交流使用</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const parseBtn = document.getElementById('parse-btn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('result-section');
            const resultContent = document.getElementById('result-content');
            const statusElement = document.getElementById('status');
            
            // 示例链接
            document.getElementById('url').value = 'https://wwi.lanzoup.com/i8pMf1p1jv0h';
            
            parseBtn.addEventListener('click', async function() {
                const url = document.getElementById('url').value.trim();
                const pwd = document.getElementById('pwd').value.trim();
                
                if (!url) {
                    alert('请输入蓝奏云链接！');
                    return;
                }
                
                // 显示加载动画，隐藏结果区域
                loading.style.display = 'block';
                resultSection.style.display = 'none';
                parseBtn.disabled = true;
                
                try {
                    // 调用解析API
                    const apiUrl = 'https://api.pearktrue.cn/api/lanzou/api.php';
                    const params = new URLSearchParams({
                        url: url,
                        pwd: pwd || ''
                    });
                    
                    const response = await fetch(`${apiUrl}?${params}`);
                    const data = await response.json();
                    
                    // 隐藏加载动画
                    loading.style.display = 'none';
                    parseBtn.disabled = false;
                    
                    // 显示结果区域
                    resultSection.style.display = 'block';
                    
                    if (data.code === 200) {
                        // 解析成功
                        statusElement.textContent = '成功';
                        statusElement.className = 'status success';
                        
                        const fileData = data.data;
                        resultContent.innerHTML = `
                            <div class="result-item">
                                <div class="result-label"><i class="fas fa-file"></i> 文件名</div>
                                <div class="result-value">${fileData.filename || '未知'}</div>
                            </div>
                            <div class="result-item">
                                <div class="result-label"><i class="fas fa-hdd"></i> 文件大小</div>
                                <div class="result-value">${fileData.filesize || '未知'}</div>
                            </div>
                            <div class="result-item">
                                <div class="result-label"><i class="fas fa-clock"></i> 上传时间</div>
                                <div class="result-value">${fileData.time || '未知'}</div>
                            </div>
                            <div class="result-item">
                                <div class="result-label"><i class="fas fa-info-circle"></i> 文件描述</div>
                                <div class="result-value">${fileData.desc || '无描述'}</div>
                            </div>
                            <div class="result-item">
                                <div class="result-label"><i class="fas fa-download"></i> 下载链接</div>
                                <div class="result-value">
                                    <a href="${fileData.downloadurl}" class="download-btn" target="_blank">
                                        <i class="fas fa-download"></i> 直接下载
                                    </a>
                                    <div style="margin-top: 10px; font-size: 0.9rem; color: #6b7280; word-break: break-all;">
                                        ${fileData.downloadurl || '无下载链接'}
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // 解析失败
                        statusElement.textContent = '失败';
                        statusElement.className = 'status error';
                        
                        resultContent.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle"></i> ${data.msg || '解析失败，请检查链接和密码是否正确'}
                            </div>
                        `;
                    }
                } catch (error) {
                    // 网络错误或其他异常
                    loading.style.display = 'none';
                    parseBtn.disabled = false;
                    
                    statusElement.textContent = '错误';
                    statusElement.className = 'status error';
                    resultSection.style.display = 'block';
                    
                    resultContent.innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-circle"></i> 网络请求失败：${error.message}
                        </div>
                    `;
                }
            });
            
            // 允许按Enter键触发解析
            document.getElementById('pwd').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    parseBtn.click();
                }
            });
        });
    </script>
</body>
</html>
